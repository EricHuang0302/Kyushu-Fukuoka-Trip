<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eric 的福岡・熊本之旅</title>
<style>
  :root {
    --paper: #f7f2e8;
    --paper-2: #fffaf1;
    --ink: #222522;
    --muted: #706b60;
    --line: #ddd2bf;
    --matcha: #7d8f68;
    --matcha-dark: #475a45;
    --indigo: #243746;
    --clay: #a65e3b;
    --gold: #b78b4b;
    --white: #fffdf8;
    --shadow: 0 18px 50px rgba(36, 55, 70, 0.09);
  }

  * { box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    margin: 0;
    min-height: 100vh;
    background:
      linear-gradient(180deg, rgba(255,250,241,0.82), rgba(247,242,232,1) 360px),
      var(--paper);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "Noto Sans JP", sans-serif;
    line-height: 1.65;
    overflow-x: hidden;
  }

  a { color: inherit; }

  .hero {
    border-bottom: 1px solid var(--line);
    background:
      linear-gradient(135deg, rgba(36,55,70,0.94), rgba(71,90,69,0.92)),
      var(--indigo);
    color: var(--white);
  }

  .hero-inner {
    width: min(1100px, calc(100% - 40px));
    margin: 0 auto;
    padding: 56px 0 46px;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
    color: #d8c69f;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0;
    text-transform: uppercase;
  }

  .eyebrow::before {
    content: "";
    width: 34px;
    height: 1px;
    background: currentColor;
  }

  h1 {
    max-width: 840px;
    margin: 0 0 16px;
    font-family: Georgia, "Times New Roman", "Noto Serif TC", serif;
    font-size: clamp(34px, 7vw, 72px);
    line-height: 1.08;
    font-weight: 600;
    overflow-wrap: anywhere;
  }

  .day-nav-wrap {
    position: sticky;
    top: 0;
    z-index: 20;
    border-bottom: 1px solid var(--line);
    background: rgba(247,242,232,0.94);
    backdrop-filter: blur(14px);
  }

  .day-nav {
    width: min(1100px, calc(100% - 28px));
    margin: 0 auto;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 12px 0;
    scrollbar-width: none;
  }

  .day-nav::-webkit-scrollbar { display: none; }

  .day-btn {
    flex: 0 0 auto;
    min-width: 112px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: rgba(255,253,248,0.72);
    color: var(--muted);
    padding: 9px 12px;
    text-align: left;
    cursor: pointer;
    transition: border-color .2s ease, background .2s ease, color .2s ease, transform .2s ease;
  }

  .day-btn:hover {
    border-color: var(--matcha);
    color: var(--ink);
    transform: translateY(-1px);
  }

  .day-btn.active {
    border-color: var(--matcha-dark);
    background: var(--matcha-dark);
    color: var(--white);
  }

  .day-date {
    display: block;
    font-size: 18px;
    font-weight: 800;
    line-height: 1.1;
  }

  .day-title {
    display: block;
    margin-top: 3px;
    font-size: 12px;
    white-space: nowrap;
  }

  main {
    width: min(1100px, calc(100% - 40px));
    margin: 0 auto;
    padding: 34px 0 72px;
  }

  .panel {
    border: 1px solid var(--line);
    border-radius: 8px;
    background: rgba(255,253,248,0.72);
    box-shadow: var(--shadow);
  }

  .panel-inner { padding: 22px; }

  .panel h2,
  .panel h3,
  .day-panel h2,
  .section-title {
    margin: 0;
    font-family: Georgia, "Times New Roman", "Noto Serif TC", serif;
    font-weight: 600;
  }

  .day-summary,
  .item-title,
  .item-note,
  .note-card p,
  .check-item p {
    overflow-wrap: anywhere;
    word-break: break-word;
  }

  .quick-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 16px;
  }

  .tag {
    display: inline-flex;
    align-items: center;
    min-height: 26px;
    padding: 4px 9px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: rgba(255,250,241,0.9);
    color: var(--muted);
    font-size: 12px;
    font-weight: 700;
  }

  .tag.important {
    border-color: rgba(166,94,59,0.36);
    background: rgba(166,94,59,0.09);
    color: var(--clay);
  }

  .tag.confirm {
    border-color: rgba(71,90,69,0.35);
    background: rgba(125,143,104,0.14);
    color: var(--matcha-dark);
  }

  .tag.traffic {
    border-color: rgba(36,55,70,0.28);
    background: rgba(36,55,70,0.08);
    color: var(--indigo);
  }

  .day-panel {
    display: none;
    animation: fade .18s ease;
  }

  .day-panel.active { display: block; }

  @keyframes fade {
    from { opacity: .4; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .day-heading {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 18px;
    align-items: end;
    margin: 0 0 20px;
    padding: 26px 0 18px;
    border-bottom: 1px solid var(--line);
  }

  .date-kicker {
    margin-bottom: 8px;
    color: var(--matcha-dark);
    font-size: 12px;
    font-weight: 800;
  }

  .day-heading h2 {
    font-size: clamp(26px, 4vw, 42px);
    line-height: 1.18;
  }

  .day-summary {
    max-width: 740px;
    margin: 10px 0 0;
    color: var(--muted);
    font-size: 15px;
  }

  .stay-badge {
    justify-self: end;
    min-width: 156px;
    padding: 12px 14px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--paper-2);
    color: var(--muted);
    font-size: 13px;
    text-align: right;
  }

  .stay-badge strong {
    display: block;
    color: var(--ink);
    font-size: 15px;
  }

  .timeline {
    display: grid;
    gap: 12px;
  }

  .timeline-item {
    display: grid;
    grid-template-columns: 124px 1fr;
    gap: 16px;
    padding: 16px;
    border: 1px solid rgba(221,210,191,0.88);
    border-radius: 8px;
    background: rgba(255,253,248,0.76);
  }

  .timeline-item.traffic-item {
    border-color: rgba(36,55,70,0.22);
    border-left: 4px solid var(--indigo);
    background: linear-gradient(135deg, rgba(36,55,70,0.08), rgba(125,143,104,0.08));
  }

  .traffic-item .time,
  .traffic-item .item-title {
    color: var(--indigo);
  }

  .traffic-item .link-pill {
    border-color: rgba(36,55,70,0.28);
    background: rgba(36,55,70,0.08);
    color: var(--indigo);
  }

  .time {
    color: var(--matcha-dark);
    font-size: 13px;
    font-weight: 800;
  }

  .item-main {
    min-width: 0;
  }

  .item-title {
    margin: 0;
    color: var(--ink);
    font-size: 16px;
    font-weight: 800;
    line-height: 1.45;
  }

  .item-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 7px;
  }

  .item-note {
    margin: 5px 0 0;
    color: var(--muted);
    font-size: 13px;
  }

  .link-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }

  .link-pill {
    display: inline-flex;
    align-items: center;
    min-height: 30px;
    padding: 5px 10px;
    border: 1px solid rgba(71,90,69,0.26);
    border-radius: 999px;
    background: rgba(125,143,104,0.11);
    color: var(--matcha-dark);
    font-size: 12px;
    font-weight: 800;
    text-decoration: none;
  }

  .link-pill:hover {
    border-color: var(--matcha-dark);
    background: rgba(125,143,104,0.18);
  }

  .section {
    margin-top: 24px;
  }

  .section-title {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
    color: var(--indigo);
    font-size: 20px;
  }

  .section-title::after {
    content: "";
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--line), transparent);
  }

  .note-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
  }

  .note-card {
    border: 1px solid var(--line);
    border-radius: 8px;
    background: rgba(255,250,241,0.68);
    padding: 15px;
  }

  .note-card h4 {
    margin: 0 0 7px;
    color: var(--ink);
    font-size: 14px;
  }

  .note-card p,
  .note-card li {
    color: var(--muted);
    font-size: 13px;
  }

  .note-card p { margin: 0; }

  .note-card ul {
    margin: 8px 0 0;
    padding-left: 18px;
  }

  details {
    border: 1px solid var(--line);
    border-radius: 8px;
    background: rgba(255,253,248,0.72);
    overflow: hidden;
  }

  details + details { margin-top: 10px; }

  summary {
    padding: 14px 16px;
    cursor: pointer;
    color: var(--indigo);
    font-size: 14px;
    font-weight: 800;
  }

  .detail-body {
    padding: 0 16px 16px;
    color: var(--muted);
    font-size: 13px;
  }

  .detail-body ul {
    margin: 0;
    padding-left: 18px;
  }

  .checklist {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
  }

  .check-item {
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--white);
    padding: 15px;
  }

  .check-item h4 {
    margin: 0 0 7px;
    color: var(--ink);
    font-size: 14px;
  }

  .check-item p {
    margin: 0;
    color: var(--muted);
    font-size: 13px;
  }

  .footer-note {
    margin-top: 34px;
    padding-top: 18px;
    border-top: 1px solid var(--line);
    color: var(--muted);
    font-size: 12px;
  }

  @media (max-width: 820px) {
    .hero-inner,
    main {
      width: min(680px, calc(100% - 28px));
    }

    .hero-inner { padding-top: 42px; }

    .note-grid,
    .checklist {
      grid-template-columns: 1fr;
    }

    .day-heading {
      grid-template-columns: 1fr;
      align-items: start;
    }

    .stay-badge {
      justify-self: stretch;
      text-align: left;
    }
  }

  @media (max-width: 560px) {
    h1 {
      font-size: 30px;
      line-height: 1.16;
    }

    .day-nav {
      width: calc(100% - 20px);
      padding: 10px 0;
    }

    .day-btn {
      min-width: 96px;
      padding: 8px 10px;
    }

    .timeline-item {
      grid-template-columns: 1fr;
      gap: 7px;
      padding: 14px;
    }

    .time {
      padding-bottom: 7px;
      border-bottom: 1px solid rgba(221,210,191,0.72);
    }

    .panel-inner { padding: 18px; }
  }
</style>
</head>

  </main>

function escapeHtml(value) {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function linkHtml(pair) {
  const [label, href] = pair;
  return `<a class="link-pill" href="${escapeHtml(href)}" target="_blank" rel="noopener noreferrer">${escapeHtml(label)}</a>`;
}

function timelineHtml(item) {
  const linksHtml = item.links?.length
    ? `<div class="link-row">${item.links.map(linkHtml).join("")}</div>`
    : "";
  const meta = [
    item.kind === "traffic" ? `<span class="tag traffic">交通</span>` : "",
    ...(item.labels || []).map(label => `<span class="tag ${label === "需預約" ? "important" : "confirm"}">${escapeHtml(label)}</span>`)
  ].filter(Boolean).join("");
  const metaHtml = meta ? `<div class="item-meta">${meta}</div>` : "";
  return `
    <article class="timeline-item ${item.kind === "traffic" ? "traffic-item" : ""}">
      <div class="time">${escapeHtml(item.time)}</div>
      <div class="item-main">
        ${metaHtml}
        <h3 class="item-title">${escapeHtml(item.title)}</h3>
        <p class="item-note">${escapeHtml(item.note)}</p>
        ${linksHtml}
      </div>
    </article>
  `;
}

function noteHtml(note) {
  return `
    <article class="note-card">
      <h4>${escapeHtml(note.title)}</h4>
      <p>${escapeHtml(note.text)}</p>
    </article>
  `;
}

function detailsHtml(detail) {
  return `
    <details>
      <summary>${escapeHtml(detail.title)}</summary>
      <div class="detail-body">
        <ul>${detail.items.map(item => `<li>${escapeHtml(item)}</li>`).join("")}</ul>
      </div>
    </details>
  `;
}

function render() {
  const dayNav = document.getElementById("dayNav");
  const dayPanels = document.getElementById("dayPanels");

  dayNav.innerHTML = days.map((day, index) => `
    <button class="day-btn ${index === 0 ? "active" : ""}" type="button" data-day="${day.id}" aria-controls="${day.id}" aria-selected="${index === 0 ? "true" : "false"}">
      <span class="day-date">${escapeHtml(day.navDate)}</span>
      <span class="day-title">${escapeHtml(day.navTitle)}</span>
    </button>
  `).join("");

  dayPanels.innerHTML = days.map((day, index) => `
    <article id="${day.id}" class="day-panel ${index === 0 ? "active" : ""}">
      <header class="day-heading">
        <div>
          <div class="date-kicker">${escapeHtml(day.date)}</div>
          <h2>${escapeHtml(day.title)}</h2>
          <p class="day-summary">${escapeHtml(day.summary)}</p>
          <div class="quick-tags">${day.tags.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join("")}</div>
        </div>
        <div class="stay-badge">
          <span>住宿</span>
          <strong>${escapeHtml(day.stay)}</strong>
        </div>
      </header>

      <section class="section" aria-label="${escapeHtml(day.navDate)} 時間軸">
        <h2 class="section-title">時間軸</h2>
        <div class="timeline">${day.timeline.map(timelineHtml).join("")}</div>
      </section>

      <section class="section" aria-label="${escapeHtml(day.navDate)} 備註">
        <h2 class="section-title">重點備註</h2>
        <div class="note-grid">${day.notes.map(noteHtml).join("")}</div>
      </section>

      ${day.details?.length ? `<section class="section" aria-label="${escapeHtml(day.navDate)} 詳細補充">${day.details.map(detailsHtml).join("")}</section>` : ""}
    </article>
  `).join("");

  dayNav.addEventListener("click", event => {
    const button = event.target.closest(".day-btn");
    if (!button) return;
    showDay(button.dataset.day);
  });
}

function showDay(id) {
  document.querySelectorAll(".day-panel").forEach(panel => {
    panel.classList.toggle("active", panel.id === id);
  });
  document.querySelectorAll(".day-btn").forEach(button => {
    const active = button.dataset.day === id;
    button.classList.toggle("active", active);
    button.setAttribute("aria-selected", active ? "true" : "false");
  });
  const navBottom = document.querySelector(".day-nav-wrap").getBoundingClientRect().bottom;
  const currentY = window.scrollY;
  const target = document.getElementById(id).getBoundingClientRect().top + currentY - navBottom - 10;
  window.scrollTo({ top: Math.max(0, target), behavior: "smooth" });
}

render();
</script>
